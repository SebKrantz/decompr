url: https://sebkrantz.github.io/decompr/

home:
  title: Global Value Chain Decomposition

template:
  bootstrap: 5
  bootswatch: sandstone
  theme: arrow-light
  math-rendering: katex
  bslib:
    primary: "#1a3a4a"
    code-color: "#005f87"
    gray-dark: "#3f464d"

development:
  mode: auto

navbar:
  title: decompr
  structure:
    left:
    - reference
    - articles
    - news
    right:
    - search
    - github
  components:
    reference:
      text: Reference
      href: reference/index.html
    articles:
      text: Vignettes
      href: articles/index.html
    news:
      text: News
      href: news/index.html
    github:
      icon: fa-github
      href: https://github.com/SebKrantz/decompr
      aria-label: GitHub

reference:

- contents:
  - decompr-package

- title: "Data Input"
  desc: "Parse raw ICIO table matrices into a `decompr` class object."
- contents:
  - load_tables_vectors
  - load_tables

- title: "Leontief Decomposition"
  desc: "Derive the value-added origin of exports by country and industry (Hummels, Ishii & Yi 2001)."
- contents:
  - leontief

- title: "Koopman-Wang-Wei (KWW) Decomposition"
  desc: "Split country-level exports into 9 value-added components (Koopman, Wang & Wei 2014)."
- contents:
  - kww
  - wwz2kww

- title: "Wang-Wei-Zhu (WWZ) Decomposition"
  desc: "Split bilateral exports into 16 value-added components by importing country (Wang, Wei & Zhu 2013)."
- contents:
  - wwz

- title: "Borin-Mancini (BM) Decomposition"
  desc: "Split gross exports into up to 13 value-added and GVC participation components (Borin & Mancini 2019)."
- contents:
  - bm

- title: "Convenience Interface"
  desc: "High-level wrapper for running any decomposition with a single call."
- contents:
  - decomp

- title: "Example Data"
  desc: "Built-in 3×3 ICIO table (leather sector) for testing and learning."
- contents:
  - leather

articles:
- title: Introduction to decompr
  desc: >
    Walk-through of the main workflow: loading ICIO tables, running all four
    decompositions, and interpreting the value-added components.
  contents:
  - decompr
